<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:white;
overflow:hidden;
font-family:Arial;
}

model-viewer{
width:100vw;
height:100vh;
background:white;
}

/* BOTON AR */

.button {

position:absolute;

bottom:40px;
left:50%;

transform:translateX(-50%);

text-decoration:none;

color:#fff;

background:linear-gradient(
45deg,
#0ce39a,
#69007f,
#fc0987
);

padding:14px 25px;

border-radius:12px;

font-size:1.1em;
font-weight:bold;

cursor:pointer;

border:none;

overflow:hidden;

}

.button span{
position:relative;
z-index:1;
}

.button::before{

content:"";

position:absolute;

inset:1px;

background:#272727;

border-radius:11px;

transition:0.5s;

}

.button:hover::before{
opacity:0.7;
}

.button::after{

content:"";

position:absolute;

inset:0px;

background:linear-gradient(
45deg,
#0ce39a,
#69007f,
#fc0987
);

border-radius:11px;

transition:0.5s;

opacity:0;

filter:blur(20px);

}

.button:hover::after{
opacity:1;
}

</style>

</head>

<body>

<model-viewer
src="./Disco3D.glb"

ar
ar-modes="scene-viewer webxr quick-look"

camera-controls
auto-rotate

interaction-prompt="auto"

shadow-intensity="1"
environment-image="neutral"
exposure="1.2"

camera-orbit="0deg 75deg 2m"

style="width:100vw;height:100vh;">

<button class="button" slot="ar-button">
<span>Ver en AR</span>
</button>

</model-viewer>

</body>

</html>
