<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body style="margin:0;">

<model-viewer
src="./Disco3D.glb"

ar
ar-modes="scene-viewer webxr quick-look"
ar-scale="fixed"

camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral"
exposure="1"

style="width:100vw;height:100vh;background:#111;">

<button slot="ar-button"
style="
background:black;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:16px;
cursor:pointer;
">

Ver en AR

</button>

</model-viewer>

</body>
</html>
